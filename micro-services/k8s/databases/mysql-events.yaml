apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-events
  template:
    metadata:
      labels:
        app: mysql-events
    spec:
      containers:
        - name: mysql-events
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "rootpass"
            - name: MYSQL_DATABASE
              value: "events_db"
            - name: MYSQL_USER
              value: "events_user"
            - name: MYSQL_PASSWORD
              value: "events_pass"
          ports:
            - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-events
spec:
  selector:
    app: mysql-events
  ports:
    - port: 3306
      targetPort: 3306
