version: '3.7'

services:
  db:
    container_name: MariaDB
    image: mariadb:latest
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: &db_user user
      MYSQL_PASSWORD: &db_password password
      MYSQL_DATABASE: &db_name mydatabase
    ports:
      - "3307:3306"
    volumes:
      - ./backend/init-db:/docker-entrypoint-initdb.d
      - mariadb_bike:/var/lib/mysql  


  backend:
    container_name: Flask
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      MYSQL_USER: *db_user
      MYSQL_PASSWORD: *db_password
      MYSQL_DATABASE: *db_name
      FLASK_RUN_PORT: 5000
      FLASK_DEBUG: ${FLASK_DEBUG}
    depends_on:
      - db
    volumes:
      - ./backend:/app  # Needed for live-reload if in development
    command: flask run --host=0.0.0.0

  frontend:
    container_name: Next.js
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ./frontend/src:/app/src  # Needed for live-reload if in development
      - ./frontend/public:/app/public # Needed for live-reload if in development
    command: |
      sh -c "if [ \"$NODE_ENV\" = \"development\" ]; then
        npm run dev  # Run in development mode
      else
        npm run build && npm run start  # Run in production mode
      fi"

volumes:
  mariadb_bike: {}

  
