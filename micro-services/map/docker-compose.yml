services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: geo_db
      MYSQL_USER: map_user
      MYSQL_PASSWORD: map_pass
    ports:
      - "3308:3306"
    volumes:
      - map_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  map_mysql_data:
